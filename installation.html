<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installation | StateScript</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #05020a; color: white; margin: 0; padding: 0; font-family: sans-serif; }
        .card { background: rgba(20, 15, 30, 0.8); border: 1px solid rgba(139, 92, 246, 0.3); }
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; background-color: #05020a; }
        .text-animate { animation: pulse-violet 2s infinite; }
        @keyframes pulse-violet { 0%, 100% { color: #8b5cf6; text-shadow: 0 0 10px #8b5cf6; } 50% { color: #c4b5fd; text-shadow: 0 0 20px #8b5cf6; } }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="p-6 max-w-5xl mx-auto flex justify-between items-center">
        <a href="index.html" class="text-2xl font-black italic block">State<span class="text-purple-500">Script</span></a>
        <div class="flex gap-2 font-bold text-sm">
            <button onclick="setLang('fr')" class="hover:text-purple-500">FR</button>
            <span>|</span>
            <button onclick="setLang('en')" class="hover:text-purple-500">EN</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6">
        <h1 class="text-3xl font-black mb-8 text-center text-animate" id="title">Processus d'installation</h1>
        
        <div class="card p-8 rounded-3xl space-y-6">
            <ol class="space-y-4 text-gray-300" id="content">
                <!-- Contenu chargé par JS -->
            </ol>
        </div>

        <div class="mt-8 text-center">
            <a href="https://discord.com/users/_kirkz_" target="_blank" id="contact" class="inline-block px-8 py-3 bg-[#5865F2] rounded-xl font-bold hover:bg-[#4752C4] transition">
                Contacter _kirkz_ sur Discord
            </a>
        </div>

        <div class="mt-16 text-center">
            <p class="text-gray-500 text-sm mb-4" id="payment">Paiements 100% sécurisés :</p>
            <div class="flex justify-center gap-8 text-3xl text-gray-400">
                <i class="fa-brands fa-paypal"></i>
                <i class="fa-solid fa-credit-card"></i>
                <i class="fa-brands fa-apple-pay"></i>
            </div>
        </div>
    </main>

    <script>
        const translations = {
            fr: {
                title: "Processus d'installation",
                steps: ["Choisissez la fonction du cheat que vous voulez !", "Ensuite payer la carte cadeau paypal.", "Envoyer le code sur discord à _kirkz_.", "Vous allez recevoir tout les fichiers (le script, le fichier one state à jour, et la certification).", "Il est possible d’être guider en appel discord durant toute l’installation."],
                contact: "Contacter _kirkz_ sur Discord",
                payment: "Paiements 100% sécurisés :"
            },
            en: {
                title: "Installation Process",
                steps: ["Choose the cheat function you want !", "Then pay for the PayPal gift card.", "Send the code on Discord to _kirkz_.", "You will receive all files (the script, the updated One State file, and the certification).", "It is possible to be guided in a Discord call throughout the installation."],
                contact: "Contact _kirkz_ on Discord",
                payment: "100% secure payments :"
            }
        };

        function setLang(lang) {
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('contact').innerText = translations[lang].contact;
            document.getElementById('payment').innerText = translations[lang].payment;
            const list = document.getElementById('content');
            list.innerHTML = "";
            translations[lang].steps.forEach((step, index) => {
                list.innerHTML += `<li class="flex gap-4"><span class="font-bold text-purple-500">${index + 1}.</span> <span>${step}</span></li>`;
            });
        }
        setLang('fr');

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#7c3aed" },
                "shape": { "type": "circle" },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#7c3aed", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 1 }
            }
        });
    </script>
</body>
</html>
