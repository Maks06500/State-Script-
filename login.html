<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion | StateScript</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#05020a] text-white flex items-center justify-center min-h-screen p-4">
    
    <div class="p-12 md:p-20 bg-gray-900 border-4 border-purple-500 rounded-[4rem] w-full max-w-2xl shadow-[0_0_80px_rgba(168,85,247,0.4)]">
        <h2 class="text-5xl font-black mb-16 text-center uppercase tracking-widest text-purple-400">CONNEXION</h2>
        
        <input id="email" type="email" placeholder="Email" class="w-full p-8 mb-12 bg-black rounded-3xl border-4 border-gray-700 text-4xl placeholder-gray-600 focus:border-purple-500 outline-none transition-all">
        <input id="password" type="password" placeholder="Mot de passe" class="w-full p-8 mb-16 bg-black rounded-3xl border-4 border-gray-700 text-4xl placeholder-gray-600 focus:border-purple-500 outline-none transition-all">
        
        <button id="registerBtn" onclick="register()" class="w-full py-10 bg-purple-600 hover:bg-purple-500 rounded-3xl font-black text-5xl transition-transform hover:scale-105 active:scale-95 shadow-2xl">
            VALIDER
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const auth = getAuth(initializeApp({
            apiKey: "AIzaSyCdaDhtjMSu1cdW5qbtGN47pkOEyh3yi1A",
            authDomain: "scriptstate-2d090.firebaseapp.com",
            projectId: "scriptstate-2d090"
        }));

        window.register = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            createUserWithEmailAndPassword(auth, email, password)
                .then(() => { 
                    alert("Compte créé avec succès !"); 
                    window.location.href = "index.html"; 
                })
                .catch((e) => alert("Erreur : " + e.message));
        };
    </script>
</body>
</html>
