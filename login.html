<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion | StateScript</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chargement de particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        /* Configuration de l'arrière-plan animé */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
</head>
<body class="bg-[#05020a] text-white flex items-center justify-center min-h-screen p-4">
    
    <!-- Conteneur des particules -->
    <div id="particles-js"></div>

    <div class="p-12 md:p-20 bg-gray-900 border-4 border-purple-500 rounded-[4rem] w-full max-w-2xl shadow-[0_0_80px_rgba(168,85,247,0.4)]">
        <h2 class="text-5xl font-black mb-16 text-center uppercase tracking-widest text-purple-400">CONNEXION</h2>
        
        <input id="email" type="email" placeholder="Email" class="w-full p-8 mb-12 bg-black rounded-3xl border-4 border-gray-700 text-4xl placeholder-gray-600 focus:border-purple-500 outline-none transition-all">
        <input id="password" type="password" placeholder="Mot de passe" class="w-full p-8 mb-16 bg-black rounded-3xl border-4 border-gray-700 text-4xl placeholder-gray-600 focus:border-purple-500 outline-none transition-all">
        
        <div class="flex flex-col gap-6">
            <button onclick="login()" class="w-full py-8 bg-blue-600 hover:bg-blue-500 rounded-3xl font-black text-4xl transition-transform hover:scale-105 shadow-xl">
                SE CONNECTER
            </button>
            <button onclick="register()" class="w-full py-8 bg-purple-600 hover:bg-purple-500 rounded-3xl font-black text-4xl transition-transform hover:scale-105 shadow-xl">
                S'INSCRIRE
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const auth = getAuth(initializeApp({
            apiKey: "AIzaSyCdaDhtjMSu1cdW5qbtGN47pkOEyh3yi1A",
            authDomain: "scriptstate-2d090.firebaseapp.com",
            projectId: "scriptstate-2d090"
        }));

        window.login = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, password)
                .then(() => { alert("Connexion réussie !"); window.location.href = "index.html"; })
                .catch((e) => alert("Erreur : " + e.message));
        };

        window.register = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            createUserWithEmailAndPassword(auth, email, password)
                .then(() => { alert("Compte créé !"); window.location.href = "index.html"; })
                .catch((e) => alert("Erreur : " + e.message));
        };
    </script>

    <!-- Initialisation légère des particules -->
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 30, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "opacity": { "value": 0.2 },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 200, "color": "#ffffff", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1 }
            },
            "interactivity": { "events": { "onhover": { "enable": false }, "onclick": { "enable": false } } },
            "retina_detect": true
        });
    </script>
</body>
</html>
