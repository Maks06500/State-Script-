<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion | StateScript</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdaDhtjMSu1cdW5qbtGN47pkOEyh3yi1A",
            authDomain: "scriptstate-2d090.firebaseapp.com",
            projectId: "scriptstate-2d090",
            storageBucket: "scriptstate-2d090.firebasestorage.app",
            messagingSenderId: "751420301339",
            appId: "1:751420301339:web:4647db7c91941b195198be"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Connexion
        window.login = function() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => window.location.href = "index.html")
                .catch((error) => alert("Erreur de connexion : " + error.message));
        };

        // Inscription
        window.register = function() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            createUserWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    alert("Compte créé avec succès !");
                    window.location.href = "index.html";
                })
                .catch((error) => alert("Erreur d'inscription : " + error.message));
        };
    </script>
</head>
<body class="bg-[#05020a] text-white flex items-center justify-center h-screen">
    <div class="p-8 bg-gray-900 border border-purple-500 rounded-3xl w-80">
        <h2 class="text-xl font-bold mb-4 text-center">Connexion / Inscription</h2>
        <input id="email" type="email" placeholder="Email" class="w-full p-2 mb-2 bg-black rounded border border-gray-600">
        <input id="password" type="password" placeholder="Mot de passe" class="w-full p-2 mb-4 bg-black rounded border border-gray-600">
        <button onclick="login()" class="w-full py-2 mb-2 bg-purple-600 rounded font-bold">Se connecter</button>
        <button onclick="register()" class="w-full py-2 bg-gray-700 rounded font-bold">S'inscrire</button>
    </div>
</body>
</html>
