<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion | StateScript</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; background-color: #05020a; }
        
        /* Animation pour le titre */
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-[#05020a] text-white flex items-center justify-center min-h-screen p-4">

    <h1 class="absolute top-10 text-8xl font-black text-purple-500 tracking-tighter animate-pulse-slow">StateScript</h1>

    <select id="langSelector" onchange="changeLanguage()" class="absolute top-10 right-10 bg-gray-900 text-white py-4 px-8 text-4xl font-bold rounded-2xl border-4 border-purple-500 outline-none cursor-pointer">
        <option value="fr">FR</option>
        <option value="en">EN</option>
    </select>

    <div id="particles-js"></div>

    <div class="p-12 md:p-20 bg-gray-900 border-4 border-purple-500 rounded-[4rem] w-full max-w-2xl shadow-[0_0_80px_rgba(168,85,247,0.4)] mt-24">
        <h2 id="title" class="text-5xl font-black mb-16 text-center uppercase tracking-widest text-purple-400">CONNEXION</h2>
        
        <input id="email" type="email" placeholder="Email" class="w-full p-8 mb-12 bg-black rounded-3xl border-4 border-gray-700 text-4xl placeholder-gray-600 focus:border-purple-500 outline-none transition-all">
        <input id="password" type="password" placeholder="Mot de passe" class="w-full p-8 mb-16 bg-black rounded-3xl border-4 border-gray-700 text-4xl placeholder-gray-600 focus:border-purple-500 outline-none transition-all">
        
        <div class="flex flex-col gap-6">
            <button id="loginBtn" onclick="login()" class="w-full py-8 bg-blue-600 hover:bg-blue-500 rounded-3xl font-black text-4xl transition-transform hover:scale-105 shadow-xl">
                SE CONNECTER
            </button>
            <button id="registerBtn" onclick="register()" class="w-full py-8 bg-purple-600 hover:bg-purple-500 rounded-3xl font-black text-4xl transition-transform hover:scale-105 shadow-xl">
                S'INSCRIRE
            </button>
        </div>
    </div>

    <script>
        const translations = {
            fr: { title: "CONNEXION", login: "SE CONNECTER", register: "S'INSCRIRE" },
            en: { title: "LOGIN", login: "LOG IN", register: "SIGN UP" }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelector').value;
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('loginBtn').innerText = translations[lang].login;
            document.getElementById('registerBtn').innerText = translations[lang].register;
        }

        // Arrière-plan intensifié
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "opacity": { "value": 0.6 },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.4, "width": 1.5 },
                "move": { "enable": true, "speed": 2 }
            },
            "interactivity": { "events": { "onhover": { "enable": true, "mode": "repulse" } } },
            "retina_detect": true
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const auth = getAuth(initializeApp({
            apiKey: "AIzaSyCdaDhtjMSu1cdW5qbtGN47pkOEyh3yi1A",
            authDomain: "scriptstate-2d090.firebaseapp.com",
            projectId: "scriptstate-2d090"
        }));

        window.login = () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, password)
                .then(() => window.location.href = "index.html")
                .catch((e) => alert("Error: " + e.message));
        };

        window.register = () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            createUserWithEmailAndPassword(auth, email, password)
                .then(() => window.location.href = "index.html")
                .catch((e) => alert("Error: " + e.message));
        };
    </script>
</body>
</html>
