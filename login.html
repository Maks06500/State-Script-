<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion | StateScript</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#05020a] text-white flex items-center justify-center h-screen">
    <div class="p-16 bg-gray-900 border-2 border-purple-500 rounded-[3rem] w-[30rem] shadow-[0_0_50px_rgba(168,85,247,0.3)]">
        <h2 class="text-3xl font-black mb-10 text-center uppercase tracking-wider">Connexion</h2>
        
        <input id="email" type="email" placeholder="Email" class="w-full p-6 mb-8 bg-black rounded-2xl border-2 border-gray-600 text-2xl placeholder-gray-500">
        <input id="password" type="password" placeholder="Mot de passe" class="w-full p-6 mb-10 bg-black rounded-2xl border-2 border-gray-600 text-2xl placeholder-gray-500">
        
        <button id="registerBtn" onclick="register()" class="w-full py-7 bg-purple-600 hover:bg-purple-500 rounded-2xl font-black text-3xl transition-transform hover:scale-105 active:scale-95 shadow-lg">
            S'INSCRIRE
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const auth = getAuth(initializeApp({
            apiKey: "AIzaSyCdaDhtjMSu1cdW5qbtGN47pkOEyh3yi1A",
            authDomain: "scriptstate-2d090.firebaseapp.com",
            projectId: "scriptstate-2d090"
        }));

        window.register = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            createUserWithEmailAndPassword(auth, email, password)
                .then(() => { 
                    alert("Compte créé avec succès !"); 
                    window.location.href = "index.html"; 
                })
                .catch((e) => alert("Erreur : " + e.message));
        };
    </script>
</body>
</html>
