<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion | StateScript</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animation du fond */
        body {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #05020a 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-4">
    
    <div class="p-12 md:p-20 bg-gray-900/80 backdrop-blur-md border-4 border-purple-500 rounded-[4rem] w-full max-w-2xl shadow-[0_0_80px_rgba(168,85,247,0.4)]">
        <h2 class="text-5xl font-black mb-16 text-center uppercase tracking-widest text-purple-400">CONNEXION</h2>
        
        <input id="email" type="email" placeholder="Email" class="w-full p-8 mb-12 bg-black/50 rounded-3xl border-4 border-gray-700 text-4xl placeholder-gray-600 focus:border-purple-500 outline-none transition-all">
        <input id="password" type="password" placeholder="Mot de passe" class="w-full p-8 mb-16 bg-black/50 rounded-3xl border-4 border-gray-700 text-4xl placeholder-gray-600 focus:border-purple-500 outline-none transition-all">
        
        <div class="flex flex-col gap-6">
            <button onclick="login()" class="w-full py-8 bg-blue-600 hover:bg-blue-500 rounded-3xl font-black text-4xl transition-transform hover:scale-105 shadow-xl">
                SE CONNECTER
            </button>
            <button onclick="register()" class="w-full py-8 bg-purple-600 hover:bg-purple-500 rounded-3xl font-black text-4xl transition-transform hover:scale-105 shadow-xl">
                S'INSCRIRE
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const auth = getAuth(initializeApp({
            apiKey: "AIzaSyCdaDhtjMSu1cdW5qbtGN47pkOEyh3yi1A",
            authDomain: "scriptstate-2d090.firebaseapp.com",
            projectId: "scriptstate-2d090"
        }));

        window.login = function() {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .then(() => { alert("Connexion réussie !"); window.location.href = "index.html"; })
                .catch((e) => alert("Erreur : " + e.message));
        };

        window.register = function() {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .then(() => { alert("Compte créé !"); window.location.href = "index.html"; })
                .catch((e) => alert("Erreur : " + e.message));
        };
    </script>
</body>
</html>
