<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StateScript | Accueil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body { color: white; margin: 0; padding: 0; background-color: #05020a; }
        .card { background: rgba(20, 15, 30, 0.8); border: 1px solid rgba(139, 92, 246, 0.3); }
        .btn-grad { background: linear-gradient(90deg, #7c3aed 0%, #4f46e5 100%); }
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <!-- Header -->
    <nav class="p-6 flex justify-between items-center max-w-5xl mx-auto">
        <div class="text-2xl font-black italic">State<span class="text-purple-500">Script</span></div>
    </nav>

    <!-- Offres -->
    <main class="max-w-md mx-auto px-4 py-12 flex flex-col gap-8">
        
        <!-- 1 Semaine -->
        <div class="card p-8 rounded-[2rem] text-center flex flex-col items-center">
            <h3 class="text-xl font-bold mb-2">1 Semaine</h3>
            <p class="text-5xl font-black text-purple-500 mb-6">15€</p>
            <a href="https://www.g2a.com/fr/paypal-gift-card-15-eur-by-rewarble-global-i10000339995020?suid=e62e0056-9afb-4d10-a1a8-a3856374c04c" target="_blank" class="block w-full text-center py-4 rounded-2xl font-bold btn-grad hover:opacity-90 transition">Payer 15€</a>
        </div>

        <!-- 2 Semaines -->
        <div class="card p-8 rounded-[2rem] text-center flex flex-col items-center">
            <h3 class="text-xl font-bold mb-2">2 Semaines</h3>
            <p class="text-5xl font-black text-purple-500 mb-6">25€</p>
            <a href="https://www.g2a.com/fr/paypal-gift-card-25-eur-by-rewarble-global-i10000339995003?suid=5c951cb8-72bc-4ec0-8f6e-4cdd2f736b58" target="_blank" class="block w-full text-center py-4 rounded-2xl font-bold btn-grad hover:opacity-90 transition">Payer 25€</a>
        </div>

        <!-- 1 Mois VIP -->
        <div class="card p-8 rounded-[2rem] text-center flex flex-col items-center">
            <h3 class="text-xl font-bold mb-2">1 Mois VIP</h3>
            <p class="text-5xl font-black text-purple-500 mb-6">40€</p>
            <a href="https://www.g2a.com/fr/paypal-gift-card-25-eur-by-rewarble-global-i10000339995003?suid=5c951cb8-72bc-4ec0-8f6e-4cdd2f736b58" target="_blank" class="block w-full text-center py-4 rounded-2xl font-bold btn-grad hover:opacity-90 transition">Payer 40€</a>
        </div>
    </main>

    <!-- Footer -->
    <section class="max-w-md mx-auto px-4 pb-12 text-center">
        <p class="text-gray-500 text-sm mb-4">Paiements 100% sécurisés.</p>
        <div class="flex justify-center gap-4 mb-8 text-2xl text-gray-400">
            <span> Pay</span> <span>VISA</span> <span>PayPal</span> <span>₿</span>
        </div>
        <div class="text-xs text-gray-600 space-x-4 mb-8">
            <a href="#">Conditions d'Utilisation (TOS)</a> <span>|</span> <a href="#">Politique de Remboursement</a>
        </div>
        <p class="text-gray-700 text-sm">© 2026 StateScript. Tous droits réservés.</p>
    </section>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#7c3aed" },
                "shape": { "type": "circle" },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#7c3aed", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 1 }
            }
        });
    </script>
</body>
</html>
